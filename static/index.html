<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis 语音助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    color: #e2e2e2;
    user-select: none;
  }
  canvas { display: block; }

  /* UI overlay */
  .overlay {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    pointer-events: none;
    z-index: 10;
  }
  .overlay > * { pointer-events: auto; }

  /* Status text */
  .status-text {
    font-size: 1.1em;
    margin-bottom: 16px;
    text-shadow: 0 0 20px rgba(79, 140, 255, 0.5);
    transition: all 0.3s;
    letter-spacing: 2px;
  }
  .status-text.idle { color: #4f8cff; }
  .status-text.recording { color: #22c55e; }
  .status-text.waiting { color: #facc15; }
  .status-text.playing { color: #a78bfa; }

  /* Chat bubble */
  .chat-bubble {
    max-width: 500px;
    padding: 12px 20px;
    border-radius: 16px;
    font-size: 0.95em;
    line-height: 1.5;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
    animation: fadeUp 0.3s ease-out;
    text-align: center;
  }
  .chat-bubble.user {
    background: rgba(26, 39, 68, 0.8);
    border: 1px solid rgba(79, 140, 255, 0.3);
  }
  .chat-bubble.assistant {
    background: rgba(26, 26, 46, 0.8);
    border: 1px solid rgba(167, 139, 250, 0.3);
  }
  .chat-bubble.hidden { display: none; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } }

  /* Controls */
  .controls {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
  }
  .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }
  .btn:active { transform: scale(0.95); }
  .btn.record {
    width: 80px; height: 80px;
    font-size: 28px;
    border-color: rgba(34, 197, 94, 0.5);
    background: rgba(34, 197, 94, 0.1);
  }
  .btn.record.active {
    border-color: rgba(239, 68, 68, 0.8);
    background: rgba(239, 68, 68, 0.2);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
    50% { box-shadow: 0 0 0 15px rgba(239,68,68,0); }
  }

  /* Config panel */
  .config {
    position: fixed;
    top: 20px; right: 20px;
    background: rgba(18, 18, 26, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px;
    z-index: 20;
    display: none;
    width: 280px;
  }
  .config.show { display: block; }
  .config label { display: block; font-size: 0.8em; color: #666; margin-bottom: 4px; }
  .config input {
    width: 100%;
    padding: 8px;
    border: 1px solid #333;
    border-radius: 6px;
    background: rgba(26, 26, 46, 0.8);
    color: #e2e2e2;
    font-size: 0.85em;
    margin-bottom: 10px;
  }
  .config button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #4f8cff;
    color: #000;
    font-weight: 600;
    cursor: pointer;
  }
  .gear {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 21;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #666;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- Config gear -->
<button class="gear" onclick="toggleConfig()">⚙</button>

<!-- Config panel -->
<div class="config" id="config">
  <label>服务器地址</label>
  <input type="text" id="ws-uri" value="ws://localhost:8000/ws" placeholder="wss://your-vps/ws">
  <label>Token</label>
  <input type="password" id="token" value="dev-token-change-me" placeholder="your-token">
  <button onclick="toggleConnection()">连接</button>
</div>

<!-- Overlay UI -->
<div class="overlay">
  <div class="status-text idle" id="status">JARVIS</div>
  <div class="chat-bubble hidden" id="chat-bubble"></div>
  <div class="controls">
    <button class="btn" id="btn-cancel" style="display:none" onclick="cancelTurn()">✕</button>
    <button class="btn record" id="btn-record" onclick="toggleRecord()">🎤</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, centerX, centerY;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  centerX = W / 2;
  centerY = H / 2 - 60;
}
resize();
window.addEventListener('resize', resize);

// Particle class
class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    // Distribute in a circle
    const angle = Math.random() * Math.PI * 2;
    const radius = 80 + Math.random() * 120;
    this.baseX = centerX + Math.cos(angle) * radius;
    this.baseY = centerY + Math.sin(angle) * radius;
    this.x = this.baseX;
    this.y = this.baseY;
    this.vx = 0;
    this.vy = 0;
    this.size = 1.5 + Math.random() * 2.5;
    this.alpha = 0.3 + Math.random() * 0.5;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.005 + Math.random() * 0.01;
    this.orbitRadius = radius;
    this.orbitAngle = angle;
    this.drift = (Math.random() - 0.5) * 0.5;
  }

  update(audioLevel, state, t) {
    const intensity = audioLevel / 100; // 0..1

    if (state === 'recording') {
      // Particles explode outward with voice
      const pushForce = intensity * 8;
      const angle = Math.atan2(this.y - centerY, this.x - centerX);
      this.vx += Math.cos(angle) * pushForce;
      this.vy += Math.sin(angle) * pushForce;
      // Vibrate
      this.vx += (Math.random() - 0.5) * intensity * 4;
      this.vy += (Math.random() - 0.5) * intensity * 4;
    } else if (state === 'thinking') {
      // Orbit faster
      this.orbitAngle += 0.03;
      const r = this.orbitRadius + Math.sin(t * 3 + this.phase) * 20;
      this.baseX = centerX + Math.cos(this.orbitAngle) * r;
      this.baseY = centerY + Math.sin(this.orbitAngle) * r;
    } else if (state === 'playing') {
      // Wave with audio
      const wave = Math.sin(t * 5 + this.orbitAngle * 3) * intensity * 30;
      const angle = Math.atan2(this.baseY - centerY, this.baseX - centerX);
      this.baseX = centerX + Math.cos(this.orbitAngle) * (this.orbitRadius + wave);
      this.baseY = centerY + Math.sin(this.orbitAngle) * (this.orbitRadius + wave);
    } else {
      // Idle: gentle orbit
      this.orbitAngle += this.speed;
      this.baseX = centerX + Math.cos(this.orbitAngle) * this.orbitRadius;
      this.baseY = centerY + Math.sin(this.orbitAngle) * this.orbitRadius;
    }

    // Spring back to base
    const dx = this.baseX - this.x;
    const dy = this.baseY - this.y;
    this.vx += dx * 0.02;
    this.vy += dy * 0.02;

    // Damping
    this.vx *= 0.92;
    this.vy *= 0.92;

    // Apply drift
    this.x += this.vx + this.drift;
    this.y += this.vy;

    // Alpha based on state
    if (state === 'recording') {
      this.alpha = 0.4 + intensity * 0.6;
    } else if (state === 'thinking') {
      this.alpha = 0.5 + Math.sin(t * 4 + this.phase) * 0.3;
    } else {
      this.alpha = 0.3 + Math.sin(t + this.phase) * 0.15;
    }
  }

  draw(ctx, state, t) {
    const colors = {
      idle:      { r: 79,  g: 140, b: 255 },
      recording: { r: 34,  g: 197, b: 94  },
      waiting:   { r: 250, g: 204, b: 21  },
      playing:   { r: 167, g: 139, b: 250 },
    };
    const c = colors[state] || colors.idle;

    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${this.alpha})`;
    ctx.fill();

    // Glow
    if (this.size > 2) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${this.alpha * 0.1})`;
      ctx.fill();
    }
  }
}

// Create particles
const PARTICLE_COUNT = 300;
const particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());

// Audio level (0-100)
let audioLevel = 0;
let targetAudioLevel = 0;

function updateParticles(t) {
  // Smooth audio level
  audioLevel += (targetAudioLevel - audioLevel) * 0.15;

  // Clear with trail effect
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Draw center glow
  const glowRadius = 150 + audioLevel * 2;
  const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, glowRadius);
  const glowColors = {
    idle: 'rgba(79, 140, 255, 0.03)',
    recording: 'rgba(34, 197, 94, 0.05)',
    waiting: 'rgba(250, 204, 21, 0.04)',
    playing: 'rgba(167, 139, 250, 0.05)',
  };
  gradient.addColorStop(0, glowColors[state] || glowColors.idle);
  gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  // Update and draw particles
  for (const p of particles) {
    p.update(audioLevel, state, t);
    p.draw(ctx, state, t);
  }

  // Draw connections between close particles
  ctx.strokeStyle = `rgba(79, 140, 255, 0.05)`;
  ctx.lineWidth = 0.5;
  for (let i = 0; i < particles.length; i += 3) {
    for (let j = i + 1; j < particles.length; j += 3) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = dx * dx + dy * dy;
      if (dist < 2500) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
}

// Animation loop
let state = 'idle';
function animate(ts) {
  const t = ts / 1000;
  updateParticles(t);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);


// ═══════════════════════════════════════════════════════════════════
// WEBSOCKET + AUDIO
// ═══════════════════════════════════════════════════════════════════

let ws = null;
let mediaStream = null;
let audioContext = null;
let processor = null;
let analyser = null;
let turnId = 0;
let audioQueue = [];
let isPlaying = false;
const SAMPLE_RATE = 16000;
const CHUNK_SAMPLES = 1600;

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status-text ' + cls;
}

function showChat(text, type) {
  const el = document.getElementById('chat-bubble');
  el.textContent = text;
  el.className = 'chat-bubble ' + type;
  setTimeout(() => { if (el.textContent === text) el.className = 'chat-bubble hidden'; }, 8000);
}

function toggleConfig() {
  document.getElementById('config').classList.toggle('show');
}

function toggleConnection() {
  if (ws) { ws.close(); return; }
  const uri = document.getElementById('ws-uri').value;
  const token = document.getElementById('token').value;
  if (!uri || !token) return;

  setStatus('连接中...', 'idle');
  ws = new WebSocket(uri);

  ws.onopen = () => {
    ws.send(JSON.stringify({
      type: 'auth', token,
      device_id: 'web-particle-' + Math.random().toString(36).slice(2, 6),
      platform: 'web'
    }));
  };

  ws.onmessage = (e) => {
    if (e.data instanceof Blob) { handleBinary(e.data); return; }
    try { handleMsg(JSON.parse(e.data)); } catch(err) {}
  };

  ws.onclose = () => {
    ws = null;
    resetState();
    setStatus('已断开', 'idle');
  };

  document.getElementById('config').classList.remove('show');
}

function handleMsg(msg) {
  switch (msg.type) {
    case 'auth_ok':
      setStatus('JARVIS', 'idle');
      break;
    case 'auth_fail':
      setStatus('认证失败', 'idle');
      ws.close();
      break;
    case 'turn_rejected':
      showChat('请求被拒绝: ' + msg.reason, 'user');
      resetState();
      break;
    case 'utterance_end':
      if (state === 'recording') stopRecording();
      break;
    case 'stt_result':
      showChat(msg.text, 'user');
      break;
    case 'state':
      if (msg.value === 'thinking') { state = 'waiting'; setStatus('思考中...', 'waiting'); }
      else if (msg.value === 'speaking') { state = 'playing'; setStatus(' speaking', 'playing'); initPlayback(); }
      else if (msg.value === 'cancelled') { resetState(); }
      break;
    case 'tts_done':
      playQueue();
      break;
    case 'error':
      showChat('错误: ' + msg.message, 'user');
      resetState();
      break;
    case 'session_sync':
      if (msg.assistant_text) showChat(msg.assistant_text, 'assistant');
      break;
  }
}

async function handleBinary(blob) {
  const buf = await blob.arrayBuffer();
  const data = new Uint8Array(buf);
  if (data.length < 6 || data[0] !== 0x02) return;
  audioQueue.push(data.slice(5));
  if (state === 'playing' && !isPlaying) playQueue();
}

function initPlayback() {
  if (!audioContext || audioContext.state === 'closed') {
    audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
  }
}

function playQueue() {
  if (isPlaying || audioQueue.length === 0) return;
  isPlaying = true;

  const totalLen = audioQueue.reduce((s, c) => s + c.length, 0);
  const merged = new Uint8Array(totalLen);
  let off = 0;
  for (const chunk of audioQueue) { merged.set(chunk, off); off += chunk.length; }
  audioQueue = [];

  // Convert to float32 and drive particles
  const samples = new Float32Array(merged.length / 2);
  const view = new DataView(merged.buffer);
  let sum = 0;
  for (let i = 0; i < samples.length; i++) {
    samples[i] = view.getInt16(i * 2, true) / 32768;
    sum += samples[i] * samples[i];
  }
  const rms = Math.sqrt(sum / samples.length);
  targetAudioLevel = Math.min(100, rms * 300);

  initPlayback();
  const buffer = audioContext.createBuffer(1, samples.length, SAMPLE_RATE);
  buffer.getChannelData(0).set(samples);
  const source = audioContext.createBufferSource();
  source.buffer = buffer;
  source.connect(audioContext.destination);

  // Drive particle level during playback
  const startTime = audioContext.currentTime;
  const duration = samples.length / SAMPLE_RATE;
  function updateLevel() {
    if (audioContext.currentTime - startTime > duration) {
      targetAudioLevel = 0;
      return;
    }
    // Decay
    targetAudioLevel *= 0.95;
    requestAnimationFrame(updateLevel);
  }
  updateLevel();

  source.onended = () => {
    isPlaying = false;
    targetAudioLevel = 0;
    if (audioQueue.length > 0) { playQueue(); return; }
    state = 'idle';
    setStatus('JARVIS', 'idle');
  };
  source.start();
}

async function toggleRecord() {
  if (state === 'idle') await startRecording();
  else if (state === 'recording') stopRecording();
}

async function startRecording() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  turnId++;
  state = 'recording';
  setStatus('● 录音中', 'recording');

  document.getElementById('btn-record').classList.add('active');
  document.getElementById('btn-cancel').style.display = 'flex';

  ws.send(JSON.stringify({ type: 'wake_event', turn_id: turnId }));

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
  } catch(e) {
    showChat('麦克风权限被拒绝', 'user');
    resetState();
    return;
  }

  audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
  const source = audioContext.createMediaStreamSource(mediaStream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  source.connect(analyser);

  processor = audioContext.createScriptProcessor(CHUNK_SAMPLES, 1, 1);
  processor.onaudioprocess = (e) => {
    if (state !== 'recording') return;

    // Calculate RMS for particle level
    const float32 = e.inputBuffer.getChannelData(0);
    let sum = 0;
    for (let i = 0; i < float32.length; i++) sum += float32[i] * float32[i];
    const rms = Math.sqrt(sum / float32.length);
    targetAudioLevel = Math.min(100, rms * 500);

    // Send PCM to server
    const pcm16 = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      pcm16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32767));
    }
    const frame = new Uint8Array(5 + pcm16.length * 2);
    frame[0] = 0x01;
    new DataView(frame.buffer).setUint32(1, turnId, true);
    frame.set(new Uint8Array(pcm16.buffer), 5);
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(frame);
  };

  source.connect(processor);
  processor.connect(audioContext.destination);
}

function stopRecording() {
  if (processor) { try { processor.disconnect(); } catch(e) {} processor = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  analyser = null;
  targetAudioLevel = 0;

  if (state !== 'recording') return;
  state = 'waiting';
  setStatus('等待回复...', 'waiting');
  document.getElementById('btn-record').classList.remove('active');

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'audio_done', turn_id: turnId }));
  }
}

function cancelTurn() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'cancel', turn_id: turnId }));
  }
  resetState();
}

function resetState() {
  if (processor) { try { processor.disconnect(); } catch(e) {} processor = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  audioQueue = [];
  if (isPlaying && audioContext) { try { audioContext.close(); } catch(e) {} isPlaying = false; }
  targetAudioLevel = 0;
  state = 'idle';
  setStatus('JARVIS', 'idle');
  document.getElementById('btn-record').classList.remove('active');
  document.getElementById('btn-cancel').style.display = 'none';
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); toggleRecord(); }
  if (e.code === 'Escape') { e.preventDefault(); cancelTurn(); }
});
</script>
</body>
</html>
